server {
  listen 80;
  server_name _;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Request-Id $request_id;
  proxy_set_header X-Correlation-Id $request_id;

  add_header Access-Control-Allow-Origin $http_origin always;
  add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
  add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
  add_header Access-Control-Expose-Headers "X-Request-Id, X-Correlation-Id" always;
  add_header Access-Control-Allow-Credentials "true" always;
  add_header Vary "Origin, Access-Control-Request-Headers" always;
  proxy_hide_header Access-Control-Allow-Credentials;
  proxy_hide_header Access-Control-Allow-Headers;
  proxy_hide_header Access-Control-Allow-Methods;
  proxy_hide_header Access-Control-Allow-Origin;
  proxy_hide_header Access-Control-Expose-Headers;

  location /api/v1/ {
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
    add_header Access-Control-Expose-Headers "X-Request-Id, X-Correlation-Id" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Vary "Origin, Access-Control-Request-Headers" always;

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers $http_access_control_request_headers always;
      add_header Access-Control-Expose-Headers "X-Request-Id, X-Correlation-Id" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Vary "Origin, Access-Control-Request-Headers" always;
      return 204;
    }

    proxy_pass http://backend-spring:8080;
  }

  location /actuator/ {
    proxy_pass http://backend-spring:8080;
  }

  location /swagger-ui/ {
    proxy_pass http://backend-spring:8080;
  }

  location /v3/api-docs/ {
    proxy_pass http://backend-spring:8080;
  }

  location /external/ {
    proxy_pass http://middleware-nest:3000;
  }

  location /health {
    proxy_pass http://middleware-nest:3000;
  }
}
