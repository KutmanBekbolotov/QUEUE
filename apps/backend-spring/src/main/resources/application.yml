server:
  port: ${SERVER_PORT:8080}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: INFO
    org.springframework.boot.autoconfigure: INFO

spring:
  application:
    name: backend-spring
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:equeue}
    username: ${DB_USER:equeue}
    password: ${DB_PASSWORD:equeue}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: UTC
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      repositories:
        enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:equeue}
    password: ${RABBITMQ_PASSWORD:equeue}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true

app:
  security:
    jwt:
      secret: ${BACKEND_JWT_SECRET:replace-with-at-least-32-characters-secret}
      access-token-ttl: 15m
      refresh-token-ttl: 14d
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8088}
    integration:
      backend-key: ${BACKEND_INTEGRATION_KEY:dev-backend-integration-key-change-me}
